<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <style>
    @media (prefers-color-scheme: dark) {
      circle[stroke="#e2e8f0"] { stroke: #334155 !important; }
      circle[fill="#0f172a"] { fill: #38bdf8 !important; }
      line[stroke="#0f172a"] { stroke: #f8fafc !important; }
      circle[stroke="#0f172a"] { stroke: #f8fafc !important; }
    }
  </style>

  <!-- Icon Mark (Centered) -->
  <g transform="translate(0, 0)">
    <!-- Thin Ring Outer -->
    <circle cx="60" cy="60" r="54" fill="none" stroke="#e2e8f0" stroke-width="1.5" />
    
    <!-- Minimalist Scissors -->
    <!-- Pivot Dot -->
    <circle cx="60" cy="60" r="3" fill="#0f172a" />
    <!-- Blade Line Left -->
    <line x1="40" y1="35" x2="80" y2="85" stroke="#0f172a" stroke-width="2" stroke-linecap="round" />
    <!-- Blade Line Right -->
    <line x1="80" y1="35" x2="40" y2="85" stroke="#0f172a" stroke-width="2" stroke-linecap="round" />
    <!-- Minimal Rings -->
    <circle cx="37" cy="89" r="6" fill="none" stroke="#0f172a" stroke-width="1.5" />
    <circle cx="83" cy="89" r="6" fill="none" stroke="#0f172a" stroke-width="1.5" />
  </g>
</svg>
